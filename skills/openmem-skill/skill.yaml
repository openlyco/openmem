name: openmem
description: |
  OpenMem - Memory System for AI-powered Development
  
  Provides persistent memory storage with full-text search, version control,
  and IDE integration. Works with any AI assistant that supports skills.
  
  Use cases:
  - Record important decisions during development
  - Search past conversations and context
  - Maintain project-specific knowledge base
  - Organize meeting notes automatically

version: 2.0.0
author: OpenAlgo
homepage: https://github.com/jcgokart/openmem

commands:
  - name: init
    description: Initialize OpenMem memory
    example: openmem init --template standard
    args:
      - name: template
        type: string
        required: false
        description: "Template: minimal, standard, full"
      - name: global
        type: boolean
        required: false
        description: "Initialize global memory (~/.memory)"

  - name: add
    description: Add a memory entry
    example: openmem add "We decided to use PostgreSQL" --type decision --tags database
    args:
      - name: content
        type: string
        required: true
        description: "Memory content"
      - name: type
        type: string
        required: false
        description: "Memory type: decision, milestone, issue, knowledge"
      - name: tags
        type: string
        required: false
        description: "Comma-separated tags"

  - name: search
    description: Search memories
    example: openmem search PostgreSQL
    args:
      - name: query
        type: string
        required: true
        description: "Search keyword"
      - name: scope
        type: string
        required: false
        description: "Scope: project, global, both"

  - name: list
    description: List all memories
    example: openmem list --type decision
    args:
      - name: type
        type: string
        required: false
        description: "Filter by memory type"
      - name: limit
        type: number
        required: false
        description: "Result limit (default: 20)"

  - name: organize
    description: Organize meeting notes with AI
    example: openmem organize --auto --llm ollama
    args:
      - name: days
        type: number
        required: false
        description: "Recent N days to organize"
      - name: auto
        type: boolean
        required: false
        description: "Auto-organize with AI"
      - name: llm
        type: string
        required: false
        description: "LLM provider: ollama, deepseek, openai"

install:
  description: |
    Install OpenMem as a Python package:
    
    ```bash
    pip install openmem
    ```
    
    Or for development:
    
    ```bash
    pip install -e .
    ```

  requires:
    - python >= 3.8
    - pip

config:
  memory_dir: ".memory"
  global_dir: "~/.memory"
  db_name: "memory.db"
